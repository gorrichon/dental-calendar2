<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>予約ページ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #06C755;
    --green-dark: #05a847;
    --green-light: #e8f9ef;
    --red: #E0404A;
    --gray2: #999;
    --text: #1a1a1a;
    --white: #ffffff;
    --saturday-bg: #EFF4FF;
    --saturday-text: #3366cc;
    --sunday-bg: #FFF0F0;
    --sunday-text: #E0404A;
    --shadow: 0 2px 12px rgba(0,0,0,0.09);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f5f6fa;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 90px;
  }

  /* ===== HEADER ===== */
  .header {
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid #e8e8e8;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
  }
  .history-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: none;
    border: none;
    color: var(--green);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 600;
    padding: 4px 8px;
  }
  .history-btn svg { width: 26px; height: 26px; }

  /* ===== STEP INDICATOR ===== */
  .step-bar {
    background: var(--white);
    padding: 14px 16px 12px;
    border-bottom: 1px solid #f0f0f0;
  }
  .steps {
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    flex: 1;
    position: relative;
  }
  /* Line between dots */
  .step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 10px;
    left: calc(50% + 12px);
    right: calc(-50% + 12px);
    height: 2px;
    background: #e0e0e0;
    z-index: 0;
  }
  .step-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: white;
    font-weight: 700;
    position: relative;
    z-index: 1;
  }
  .step.active .step-dot { background: var(--green); }
  .step-label {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    line-height: 1.3;
    white-space: nowrap;
  }
  .step.active .step-label { color: var(--green); font-weight: 700; }

  /* ===== SERVICE SELECTOR BAR ===== */
  .service-bar {
    background: var(--white);
    margin: 10px 12px;
    border: 1.5px solid var(--green);
    border-radius: 10px;
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .service-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }
  .service-name {
    flex: 1;
    font-size: 16px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .service-select-btn {
    background: none;
    border: 1.5px solid var(--green);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 14px;
    color: var(--green);
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .service-select-btn:active { background: var(--green-light); }

  /* ===== WEEK NAVIGATION ===== */
  .week-nav {
    background: var(--green);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    margin: 0 12px;
    border-radius: 8px 8px 0 0;
    color: white;
  }
  .week-label {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.03em;
  }
  .nav-arrow {
    background: rgba(255,255,255,0.18);
    border: none;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .nav-arrow:active { background: rgba(255,255,255,0.36); }

  /* ===== CALENDAR TABLE ===== */
  .calendar-wrap {
    margin: 0 12px;
    background: var(--white);
    border-radius: 0 0 10px 10px;
    overflow-x: auto;
    box-shadow: var(--shadow);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 300px;
  }

  /* --- Header row --- */
  thead th {
    text-align: center;
    font-weight: 700;
    font-size: 14px;
    border-bottom: 2px solid #ebebeb;
    padding: 10px 2px 8px;
    background: var(--white);
  }
  thead th:first-child {
    width: 48px;
    font-size: 12px;
    color: var(--gray2);
    font-weight: 400;
  }
  thead .head-sat { background: var(--saturday-bg); color: var(--saturday-text); }
  thead .head-sun { background: var(--sunday-bg);   color: var(--sunday-text); }
  thead .head-closed { background: #efefef; color: #bbb; }

  .date-num { font-size: 18px; font-weight: 700; line-height: 1.2; }
  .date-day { font-size: 12px; font-weight: 500; opacity: 0.85; }
  .closed-badge { font-size: 11px; display: block; margin-top: 1px; }

  /* --- Body cells --- */
  tbody td {
    text-align: center;
    border: 1px solid #f0f0f0;
    height: 50px;
    padding: 0;
  }
  tbody td:first-child {
    font-size: 13px;
    color: var(--gray2);
    font-weight: 500;
    background: var(--white);
    border-right: 1px solid #e8e8e8;
    padding: 0 5px;
    white-space: nowrap;
  }
  .cell-sat    { background: var(--saturday-bg); }
  .cell-sun    { background: var(--sunday-bg); }
  .cell-closed { background: #f5f5f5; }

  /* ===== SLOT BUTTON ===== */
  .slot {
    width: 100%;
    height: 50px;
    border: none;
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
  }
  /* Circle ring */
  .circle {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2.5px solid var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.12s;
  }
  /* Available: empty green ring */
  .slot.available .circle { border-color: var(--green); }
  .slot.available:active .circle { background: var(--green-light); }

  /* Selected: filled green with check */
  .slot.selected .circle {
    background: var(--green);
    border-color: var(--green);
    color: white;
    font-size: 14px;
    font-weight: 700;
  }

  /* Taken / Past: gray × */
  .slot.taken .circle {
    border-color: #d0d0d0;
    color: #c0c0c0;
    font-size: 13px;
    cursor: not-allowed;
  }

  /* ===== BOTTOM ACTION BAR ===== */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1px solid #e8e8e8;
    padding: 10px 16px 16px;
    display: none;
    z-index: 100;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
  }
  .bottom-bar.visible { display: block; }
  .selected-info {
    font-size: 14px;
    color: var(--gray2);
    margin-bottom: 8px;
    text-align: center;
  }
  .selected-info strong { color: var(--text); font-weight: 700; }
  .submit-btn {
    width: 100%;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.03em;
  }
  .submit-btn:active { background: var(--green-dark); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: rgba(30,30,30,0.82);
    color: white;
    padding: 10px 22px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0;
    z-index: 200;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ===== CONFIRM MODAL ===== */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.48);
    z-index: 300;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 16px 20px 36px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.28s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .modal-handle {
    width: 36px;
    height: 4px;
    background: #e0e0e0;
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; text-align: center; }
  .modal-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 0;
    border-bottom: 1px solid #f5f5f5;
    font-size: 14px;
  }
  .modal-row .label { color: var(--gray2); }
  .modal-row .value { font-weight: 600; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn-cancel {
    flex: 1;
    padding: 14px;
    border: 1.5px solid #e0e0e0;
    background: white;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 600;
    color: var(--gray2);
  }
  .btn-confirm {
    flex: 2;
    padding: 14px;
    border: none;
    background: var(--green);
    color: white;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 700;
  }
  .btn-confirm:active { background: var(--green-dark); }
</style>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <h1>予約ページ</h1>
  <button class="history-btn" onclick="showToast('予約履歴は準備中です')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    予約履歴
  </button>
</div>

<!-- ===== STEP INDICATOR ===== -->
<div class="step-bar">
  <div class="steps">
    <div class="step active">
      <div class="step-dot">1</div>
      <div class="step-label">予約日程<br>選択</div>
    </div>
    <div class="step">
      <div class="step-dot">2</div>
      <div class="step-label">情報<br>入力</div>
    </div>
    <div class="step">
      <div class="step-dot">3</div>
      <div class="step-label">確認</div>
    </div>
    <div class="step">
      <div class="step-dot">4</div>
      <div class="step-label">完了</div>
    </div>
  </div>
</div>

<!-- ===== SERVICE SELECTOR ===== -->
<div class="service-bar">
  <div class="service-dot"></div>
  <div class="service-name" id="serviceName">検診</div>
  <button class="service-select-btn" onclick="showToast('診察区分の変更は準備中です')">選択する</button>
</div>

<!-- ===== WEEK NAVIGATION ===== -->
<div class="week-nav">
  <button class="nav-arrow" onclick="changeWeek(-1)">‹</button>
  <div class="week-label" id="weekLabel"></div>
  <button class="nav-arrow" onclick="changeWeek(1)">›</button>
</div>

<!-- ===== CALENDAR ===== -->
<div class="calendar-wrap">
  <table id="calTable">
    <thead id="calHead"></thead>
    <tbody id="calBody"></tbody>
  </table>
</div>

<!-- ===== BOTTOM ACTION BAR ===== -->
<div class="bottom-bar" id="bottomBar">
  <div class="selected-info" id="selectedInfo"></div>
  <button class="submit-btn" onclick="openModal()">この日時で予約する</button>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== CONFIRM MODAL ===== -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>予約内容の確認</h2>
    <div class="modal-row">
      <span class="label">診察区分</span>
      <span class="value" id="m-treatment"></span>
    </div>
    <div class="modal-row">
      <span class="label">予約日時</span>
      <span class="value" id="m-datetime"></span>
    </div>
    <div class="modal-row">
      <span class="label">所要時間</span>
      <span class="value">50 分</span>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">戻る</button>
      <button class="btn-confirm" onclick="confirmReservation()">予約を確定する</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const N8N_WEBHOOK_URL = 'https://n8n.exiine.com/webhook/liff-reservation';
const TREATMENT_TYPE = new URLSearchParams(location.search).get('treatment') || '検診';
const USER_ID        = new URLSearchParams(location.search).get('userId')    || '';
const LIFF_ID        = '2009294665-aOdrW1do';

document.getElementById('serviceName').textContent = TREATMENT_TYPE;

// ===== 祝日・休院日 =====
const HOLIDAYS = new Set([
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20',
  '2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-07-20',
  '2026-08-11','2026-09-21','2026-09-23','2026-10-12','2026-11-03','2026-11-23',
]);
const SPECIAL_CLOSED = new Set([
  // '2026-08-13',
]);

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function weekHasHoliday(date) {
  const dow = date.getDay();
  const mon = new Date(date);
  mon.setDate(date.getDate() - (dow === 0 ? 6 : dow - 1));
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    if (HOLIDAYS.has(fmtDate(d))) return true;
  }
  return false;
}

function isClosedDay(date) {
  const ds  = fmtDate(date);
  const dow = date.getDay();
  if (SPECIAL_CLOSED.has(ds))  return true;
  if (HOLIDAYS.has(ds))        return true;
  if (dow === 0)               return true; // 日曜
  if (dow === 4)               return !weekHasHoliday(date); // 木曜（祝日週は診察）
  return false;
}

// ===== 診療時間 =====
const WEEKDAY_SLOTS  = ['09:30','10:00','10:30','11:00','11:30','12:00','12:30','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30'];
const SATURDAY_SLOTS = ['09:30','10:00','10:30','11:00','11:30','12:00','12:30','14:30','15:00','15:30','16:00','16:30','17:00','17:30'];
const ALL_TIMES      = WEEKDAY_SLOTS;

function getSlotsForDate(date) {
  if (isClosedDay(date)) return null;
  return date.getDay() === 6 ? SATURDAY_SLOTS : WEEKDAY_SLOTS;
}

function isPast(date, time) {
  const now = new Date();
  const [h, m] = time.split(':').map(Number);
  const slot = new Date(date); slot.setHours(h, m, 0, 0);
  return slot <= now;
}

// ===== STATE =====
let weekOffset  = 0;
let selectedSlot = null;

// ダミー予約済みスロット（n8nから取得予定）
const takenSlots = new Set([
  '2026-03-02_09:00','2026-03-02_10:00','2026-03-03_14:00',
  '2026-02-28_09:00','2026-02-28_10:30','2026-02-27_11:00',
]);

// ===== WEEK DATES =====
function getWeekDates(offset) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow   = today.getDay();
  const mon   = new Date(today);
  mon.setDate(today.getDate() - dow + 1 + offset * 7);
  return Array.from({length:7}, (_, i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

const DAY_NAMES = ['日','月','火','水','木','金','土'];

// ===== RENDER =====
function render() {
  const days = getWeekDates(weekOffset);
  const s = days[0], e = days[6];
  document.getElementById('weekLabel').textContent =
    `${fmtDate(s)} 〜 ${fmtDate(e)}`;

  // --- thead ---
  document.getElementById('calHead').innerHTML = `<tr>
    <th></th>
    ${days.map(d => {
      const dow = d.getDay(), closed = isClosedDay(d);
      const cls = closed ? 'head-closed' : dow===6 ? 'head-sat' : dow===0 ? 'head-sun' : '';
      return `<th class="${cls}">
        <div class="date-num">${d.getDate()}</div>
        <div class="date-day">${DAY_NAMES[dow]}</div>
        ${closed ? '<span class="closed-badge">休院</span>' : ''}
      </th>`;
    }).join('')}
  </tr>`;

  // --- tbody ---
  document.getElementById('calBody').innerHTML = ALL_TIMES.map(time => {
    const cells = days.map(d => {
      const ds    = fmtDate(d);
      const key   = `${ds}_${time}`;
      const dow   = d.getDay();
      const slots = getSlotsForDate(d);
      const closed      = isClosedDay(d);
      const outOfHours  = !closed && (!slots || !slots.includes(time));
      const isSelected  = selectedSlot?.key === key;
      const taken       = takenSlots.has(key);
      const past        = isPast(d, time);

      // cell background
      let cellCls = closed || outOfHours ? 'cell-closed' : dow===6 ? 'cell-sat' : dow===0 ? 'cell-sun' : '';

      if (closed || outOfHours) {
        return `<td class="${cellCls}"></td>`;
      }
      const label = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${time}`;
      if (isSelected) {
        return `<td class="${cellCls}">
          <button class="slot selected" onclick="selectSlot('${ds}','${time}','${key}','${label}')">
            <div class="circle">✓</div>
          </button></td>`;
      }
      if (taken || past) {
        return `<td class="${cellCls}">
          <button class="slot taken" disabled>
            <div class="circle">×</div>
          </button></td>`;
      }
      return `<td class="${cellCls}">
        <button class="slot available" onclick="selectSlot('${ds}','${time}','${key}','${label}')">
          <div class="circle"></div>
        </button></td>`;
    }).join('');
    return `<tr><td>${time}</td>${cells}</tr>`;
  }).join('');
}

// ===== SELECT SLOT =====
function selectSlot(dateStr, time, key, label) {
  selectedSlot = (selectedSlot?.key === key) ? null : { dateStr, time, key, label };
  const bar  = document.getElementById('bottomBar');
  const info = document.getElementById('selectedInfo');
  if (selectedSlot) {
    bar.classList.add('visible');
    info.innerHTML = `選択中：<strong>${selectedSlot.label}</strong>`;
    showToast(`${selectedSlot.label} を選択しました`);
  } else {
    bar.classList.remove('visible');
  }
  render();
}

function changeWeek(dir) { weekOffset += dir; render(); }

// ===== MODAL =====
function openModal() {
  if (!selectedSlot) return;
  document.getElementById('m-treatment').textContent = TREATMENT_TYPE;
  document.getElementById('m-datetime').textContent  = selectedSlot.label;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

async function confirmReservation() {
  closeModal();
  showToast('予約を送信中…');
  try {
    let userId = USER_ID;
    if (window.liff) {
      try { const p = await liff.getProfile(); if (p.userId) userId = p.userId; } catch(e) {}
    }
    await fetch(N8N_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId, treatment_type: TREATMENT_TYPE,
        datetime: selectedSlot.label, dateStr: selectedSlot.dateStr, time: selectedSlot.time,
      })
    });
    showToast('✅ 予約が完了しました！');
    // LINEアプリ内の場合：完了メッセージを送信してウィンドウを閉じる
    if (window.liff && liff.isInClient()) {
      try {
        await liff.sendMessages([{
          type: 'text',
          text: `__LIFF_COMPLETE__|${selectedSlot.dateStr}|${selectedSlot.time}|${TREATMENT_TYPE}`
        }]);
      } catch(e) { console.warn('sendMessages error:', e); }
      setTimeout(() => liff.closeWindow(), 1500);
    }
  } catch(e) {
    showToast('❌ エラー: ' + e.message);
  }
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== LIFF INIT =====
async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) liff.login();
  } catch(e) { console.warn('LIFF init failed:', e); }
}

render();
if (window.liff) initLiff();
</script>
