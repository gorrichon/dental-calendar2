<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>予約ページ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #06C755;
    --green-dark: #05a847;
    --green-light: #e8f9ef;
    --red: #ff4d4d;
    --gray: #f0f0f0;
    --gray2: #999;
    --text: #1a1a1a;
    --white: #ffffff;
    --sunday: #fff0f0;
    --saturday: #f0f5ff;
    --shadow: 0 2px 12px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f5f6fa;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid #e0e0e0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .history-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: none;
    border: none;
    color: var(--green);
    font-size: 10px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 500;
  }
  .history-btn svg { width: 22px; height: 22px; }

  /* Info bar */
  .info-bar {
    background: var(--white);
    border: 1.5px solid var(--green);
    border-radius: 8px;
    margin: 12px 12px 0;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 500;
  }
  .info-bar .time-label { color: var(--text); }
  .info-bar .time-label span { color: var(--green); font-weight: 700; }
  .submit-btn {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 7px 18px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
    display: none;
  }
  .submit-btn.visible { display: block; }
  .submit-btn:active { background: var(--green-dark); }

  /* Week nav */
  .week-nav {
    background: var(--green);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    margin: 12px 12px 0;
    border-radius: 8px 8px 0 0;
    color: white;
  }
  .week-nav .week-label {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.03em;
  }
  .nav-arrow {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .nav-arrow:active { background: rgba(255,255,255,0.4); }

  /* Calendar table wrapper */
  .calendar-wrap {
    margin: 0 12px;
    overflow-x: auto;
    background: var(--white);
    border-radius: 0 0 8px 8px;
    box-shadow: var(--shadow);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 320px;
    font-size: 12px;
  }
  thead th {
    padding: 8px 2px;
    text-align: center;
    font-weight: 700;
    font-size: 11px;
    border-bottom: 1px solid #e0e0e0;
    position: sticky;
    top: 57px;
    background: var(--white);
    z-index: 10;
  }
  thead th:first-child {
    width: 44px;
    color: var(--gray2);
    font-weight: 400;
  }
  thead .col-sat { background: var(--saturday); color: #3366cc; }
  thead .col-sun { background: var(--sunday); color: var(--red); }
  .date-num { font-size: 13px; font-weight: 700; }
  .date-day { font-size: 10px; font-weight: 400; color: inherit; }

  tbody td {
    text-align: center;
    border: 1px solid #f0f0f0;
    height: 36px;
    padding: 0;
  }
  tbody td:first-child {
    font-size: 11px;
    color: var(--gray2);
    font-weight: 500;
    background: var(--white);
    padding: 0 4px;
    border-right: 1px solid #e0e0e0;
  }
  .col-sat { background: var(--saturday); }
  .col-sun { background: var(--sunday); }
  .col-closed { background: #ebebeb !important; }
  thead .col-closed { color: #bbb !important; background: #ebebeb !important; }
  .closed-badge { font-size: 9px; color: #bbb; display: block; }

  /* Slot states */
  .slot {
    width: 100%;
    height: 100%;
    border: none;
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    font-size: 14px;
    transition: all 0.15s;
  }
  .slot.available {
    color: #ccc;
    font-size: 12px;
  }
  .slot.available:active { background: var(--green-light); }
  .slot.taken {
    color: #ccc;
    font-size: 16px;
    cursor: not-allowed;
  }
  .slot.past {
    color: #ddd;
    cursor: not-allowed;
    background: #fafafa;
  }
  .slot.selected {
    background: var(--green);
    color: white;
    font-size: 11px;
    font-weight: 700;
    border-radius: 4px;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
    padding: 12px 16px;
    font-size: 11px;
    color: var(--gray2);
    justify-content: center;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.3s ease;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Confirm modal */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white;
    border-radius: 16px 16px 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; text-align: center; }
  .modal-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
  }
  .modal-row .label { color: var(--gray2); }
  .modal-row .value { font-weight: 600; }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .btn-cancel {
    flex: 1;
    padding: 12px;
    border: 1.5px solid #e0e0e0;
    background: white;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-confirm {
    flex: 2;
    padding: 12px;
    border: none;
    background: var(--green);
    color: white;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="header">
  <h1>予約ページ</h1>
  <button class="history-btn" onclick="showToast('予約履歴は準備中です')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    予約履歴
  </button>
</div>

<div class="info-bar">
  <div class="time-label">時間: <span>50 分</span></div>
  <button class="submit-btn" id="submitBtn" onclick="openModal()">予約する</button>
</div>

<div class="week-nav">
  <button class="nav-arrow" onclick="changeWeek(-1)">&#8249;</button>
  <div class="week-label" id="weekLabel"></div>
  <button class="nav-arrow" onclick="changeWeek(1)">&#8250;</button>
</div>

<div class="calendar-wrap">
  <table id="calTable">
    <thead id="calHead"></thead>
    <tbody id="calBody"></tbody>
  </table>
</div>

<div class="legend">
  <div class="legend-item"><span style="color:#ccc;font-size:14px">×</span>&nbsp;予約済</div>
  <div class="legend-item" style="width:18px;height:14px;background:var(--green);border-radius:3px;display:inline-block"></div>&nbsp;選択中
</div>

<div class="toast" id="toast"></div>

<!-- Confirm modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>予約内容の確認</h2>
    <div class="modal-row">
      <span class="label">診察区分</span>
      <span class="value" id="m-treatment">検診</span>
    </div>
    <div class="modal-row">
      <span class="label">予約日時</span>
      <span class="value" id="m-datetime"></span>
    </div>
    <div class="modal-row">
      <span class="label">所要時間</span>
      <span class="value">50分</span>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">戻る</button>
      <button class="btn-confirm" onclick="confirmReservation()">予約を確定する</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const N8N_WEBHOOK_URL = 'https://n8n.exiine.com/webhook/liff-reservation'; // ← ここに貼る
const TREATMENT_TYPE = new URLSearchParams(location.search).get('treatment') || '検診';
const USER_ID = new URLSearchParams(location.search).get('userId') || '';

// ===== 休院日設定 =====

// 祝日リスト（日本の祝日 2026年）
const HOLIDAYS = new Set([
  '2026-01-01', // 元日
  '2026-01-12', // 成人の日
  '2026-02-11', // 建国記念の日
  '2026-02-23', // 天皇誕生日
  '2026-03-20', // 春分の日
  '2026-04-29', // 昭和の日
  '2026-05-03', // 憲法記念日
  '2026-05-04', // みどりの日
  '2026-05-05', // こどもの日
  '2026-07-20', // 海の日
  '2026-08-11', // 山の日
  '2026-09-21', // 敬老の日
  '2026-09-23', // 秋分の日
  '2026-10-12', // スポーツの日
  '2026-11-03', // 文化の日
  '2026-11-23', // 勤労感謝の日
]);

// 特定の休院日（個別指定）← ここに追加してください
const SPECIAL_CLOSED_DATES = new Set([
  // '2026-08-13', // 夏季休暇 例
  // '2026-12-29', // 年末休暇 例
]);

// 週の中に祝日があるか判定
function weekHasHoliday(date) {
  // その週の月〜日を調べる
  const dow = date.getDay();
  const monday = new Date(date);
  monday.setDate(date.getDate() - (dow === 0 ? 6 : dow - 1));
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (HOLIDAYS.has(ds)) return true;
  }
  return false;
}

// 休院日判定関数
function isClosedDay(date) {
  const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  const dow = date.getDay();

  // 個別指定の休院日
  if (SPECIAL_CLOSED_DATES.has(dateStr)) return true;

  // 祝日
  if (HOLIDAYS.has(dateStr)) return true;

  // 日曜（0）は常に休診
  if (dow === 0) return true;

  // 木曜（4）は祝日のある週は診察、それ以外は休診
  if (dow === 4) {
    return !weekHasHoliday(date);
  }

  return false;
}

// ===== STATE =====
let weekOffset = 0;
let selectedSlot = null; // { date, time, dateStr }

// ===== DUMMY taken slots (n8nから取得する予定) =====
const takenSlots = new Set([
  '2026-03-02_09:00', '2026-03-02_10:00', '2026-03-03_14:00',
  '2026-02-28_09:00', '2026-02-28_10:30', '2026-02-27_11:00',
]);

// ===== 診療時間設定 =====
// 平日（月火水金）: 9:30〜13:00 / 14:30〜18:30
// 土曜:            9:30〜13:00 / 14:30〜17:30
const WEEKDAY_SLOTS = [
  '09:30','10:00','10:30','11:00','11:30','12:00','12:30',
  '14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30'
];
const SATURDAY_SLOTS = [
  '09:30','10:00','10:30','11:00','11:30','12:00','12:30',
  '14:30','15:00','15:30','16:00','16:30','17:00','17:30'
];

// 全スロット（行ラベル用）
const ALL_TIMES = [
  '09:30','10:00','10:30','11:00','11:30','12:00','12:30',
  '14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30'
];

// その日の診療スロットを返す（休診日はnull）
function getSlotsForDate(date) {
  if (isClosedDay(date)) return null;
  if (date.getDay() === 6) return SATURDAY_SLOTS;
  return WEEKDAY_SLOTS;
}

// ===== DATE HELPERS =====
function getWeekDates(offset) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const dow = today.getDay(); // 0=Sun
  const monday = new Date(today);
  monday.setDate(today.getDate() - dow + 1 + offset * 7);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d);
  }
  return days;
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtLabel(d) {
  return `${d.getMonth()+1}/${d.getDate()}`;
}
const dayNames = ['日','月','火','水','木','金','土'];

function isPast(date, time) {
  const now = new Date();
  const [h, m] = time.split(':').map(Number);
  const slotDate = new Date(date);
  slotDate.setHours(h, m, 0, 0);
  return slotDate <= now;
}

// ===== RENDER =====
function render() {
  const days = getWeekDates(weekOffset);
  const startLabel = `${days[0].getFullYear()}-${String(days[0].getMonth()+1).padStart(2,'0')}-${String(days[0].getDate()).padStart(2,'0')}`;
  const endLabel = `${days[6].getFullYear()}-${String(days[6].getMonth()+1).padStart(2,'0')}-${String(days[6].getDate()).padStart(2,'0')}`;
  document.getElementById('weekLabel').textContent = `${startLabel} 〜 ${endLabel}`;

  // Header
  const head = document.getElementById('calHead');
  head.innerHTML = `<tr>
    <th></th>
    ${days.map((d, i) => {
      const isClosed = isClosedDay(d);
      const cls = isClosed ? 'col-closed' : d.getDay()===6 ? 'col-sat' : d.getDay()===0 ? 'col-sun' : '';
      return `<th class="${cls}">
        <div class="date-num">${d.getDate()}</div>
        <div class="date-day">${dayNames[d.getDay()]}</div>
        ${isClosed ? '<span class="closed-badge">休院</span>' : ''}
      </th>`;
    }).join('')}
  </tr>`;

  // Body
  const body = document.getElementById('calBody');
  body.innerHTML = ALL_TIMES.map(time => {
    const cells = days.map((d, i) => {
      const dateStr = fmtDate(d);
      const key = `${dateStr}_${time}`;
      const isClosed = isClosedDay(d);
      const daySlots = getSlotsForDate(d);
      const isOutOfHours = !isClosed && (!daySlots || !daySlots.includes(time));
      const cls = isClosed ? 'col-closed' : d.getDay()===6 ? 'col-sat' : '';
      const isSelected = selectedSlot && selectedSlot.key === key;
      const isTaken = takenSlots.has(key);
      const past = isPast(d, time);

      let slotClass = 'slot';
      let content = '';
      let disabled = false;

      if (isClosed || isOutOfHours) {
        slotClass += ' past';
        content = '';
        disabled = true;
      } else if (isSelected) {
        slotClass += ' selected';
        content = '✓';
      } else if (past) {
        slotClass += ' past';
        content = '×';
        disabled = true;
      } else if (isTaken) {
        slotClass += ' taken';
        content = '×';
        disabled = true;
      } else {
        slotClass += ' available';
        content = '○';
      }

      return `<td class="${cls}"><button class="${slotClass}" ${disabled?'disabled':''} 
        onclick="selectSlot('${dateStr}','${time}','${key}','${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${time}')">
        ${content}</button></td>`;
    }).join('');
    return `<tr><td>${time}</td>${cells}</tr>`;
  }).join('');
}

function selectSlot(dateStr, time, key, label) {
  if (selectedSlot && selectedSlot.key === key) {
    selectedSlot = null;
  } else {
    selectedSlot = { dateStr, time, key, label };
  }
  const btn = document.getElementById('submitBtn');
  if (selectedSlot) {
    btn.classList.add('visible');
    showToast(`${selectedSlot.label} を選択しました`);
  } else {
    btn.classList.remove('visible');
  }
  render();
}

function changeWeek(dir) {
  weekOffset += dir;
  render();
}

// ===== MODAL =====
function openModal() {
  if (!selectedSlot) return;
  document.getElementById('m-treatment').textContent = TREATMENT_TYPE;
  document.getElementById('m-datetime').textContent = selectedSlot.label;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

async function confirmReservation() {
  closeModal();
  showToast('予約を送信中...');
  try {
    await fetch(N8N_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId: USER_ID,
        treatment_type: TREATMENT_TYPE,
        datetime: selectedSlot.label,
        dateStr: selectedSlot.dateStr,
        time: selectedSlot.time,
      })
    });
    showToast('✅ 予約が完了しました！');
    setTimeout(() => {
      // LINEウィンドウを閉じる
      if (window.liff) liff.closeWindow();
    }, 2000);
  } catch(e) {
    showToast('❌ エラーが発生しました。もう一度お試しください。');
  }
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== INIT =====
render();
</script>
</body>
</html>
